<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Acme Analytics</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 30% -10%, #1f3a4d, #12131a 60%);
      color: #e8e9f0; min-height: 100vh;
    }
    header {
      display: flex; align-items: center; gap: 20px;
      padding: 16px 28px; border-bottom: 1px solid #ffffff14;
    }
    .brand { font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(135deg, #00cec9, #6c5ce7); }
    nav { margin-left: auto; display: flex; gap: 18px; }
    nav a { color: #aeb2c2; text-decoration: none; padding: 6px 10px; border-radius: 8px; }
    nav a:hover { color: #fff; background: #ffffff10; }
    main { max-width: 880px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 26px; margin: 0 0 20px; }
    .panel {
      background: #161823; border: 1px solid #ffffff14; border-radius: 16px;
      padding: 22px; box-shadow: 0 20px 50px #0006;
    }
    .kpis { display: flex; gap: 16px; margin-bottom: 22px; }
    .kpi { flex: 1; background: #1b1e2b; border: 1px solid #ffffff10; border-radius: 12px; padding: 14px 16px; }
    .kpi .label { color: #9aa0b4; font-size: 13px; }
    .kpi .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
    canvas { width: 100%; height: 320px; display: block; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span> Acme Analytics</div>
    <nav>
      <a href="/">Chat</a>
      <a href="/dashboard">Dashboard</a>
    </nav>
  </header>
  <main>
    <h1>Ventas por región</h1>
    <div class="kpis" id="kpis"></div>
    <div class="panel"><canvas id="chart" width="1600" height="640"></canvas></div>
  </main>
  <script type="module" src="/dashboard.js"></script>
</body>
</html>
